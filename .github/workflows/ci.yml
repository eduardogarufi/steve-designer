name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt into Node.js 24 runtime for JavaScript actions now, ahead of GitHub's
  # 2026-06-02 default switch. Removes the deprecation warning on @v4 actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate plugin + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin + marketplace manifests
        run: |
          python3 - <<'PY'
          import json, sys

          # plugin.json
          with open(".claude-plugin/plugin.json") as f:
              p = json.load(f)
          if "name" not in p:
              print("::error::plugin.json missing required field: name"); sys.exit(1)
          if p["name"] != "steve-designer":
              print(f"::error::plugin.json name mismatch: {p['name']!r}"); sys.exit(1)
          print(f"OK plugin.json: {p['name']} v{p.get('version','?')}")

          # marketplace.json
          with open(".claude-plugin/marketplace.json") as f:
              m = json.load(f)
          for key in ("name", "owner", "plugins"):
              if key not in m:
                  print(f"::error::marketplace.json missing required field: {key}"); sys.exit(1)
          if not isinstance(m["plugins"], list) or not m["plugins"]:
              print("::error::marketplace.json plugins[] must be a non-empty list"); sys.exit(1)
          plugin_names = [pl.get("name") for pl in m["plugins"]]
          if "steve-designer" not in plugin_names:
              print(f"::error::marketplace.json does not list steve-designer plugin (found {plugin_names})"); sys.exit(1)
          # version drift check
          for pl in m["plugins"]:
              if pl.get("name") == "steve-designer" and pl.get("version") != p.get("version"):
                  print(f"::warning::version drift: plugin.json={p.get('version')} vs marketplace.json={pl.get('version')}")
          print(f"OK marketplace.json: {m['name']} ({len(m['plugins'])} plugin(s))")
          PY

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: "./scripts"
          additional_files: "install.sh"

      - name: Check file structure
        run: |
          set -e
          echo "Verifying required plugin structure..."
          test -f .claude-plugin/plugin.json      || { echo "::error::missing .claude-plugin/plugin.json"; exit 1; }
          test -f .claude-plugin/marketplace.json || { echo "::error::missing .claude-plugin/marketplace.json"; exit 1; }
          test -f skills/steve-designer/SKILL.md  || { echo "::error::missing skills/steve-designer/SKILL.md"; exit 1; }
          test -f commands/start.md               || { echo "::error::missing commands/start.md"; exit 1; }
          test -f commands/resume.md              || { echo "::error::missing commands/resume.md"; exit 1; }
          test -f commands/arsenal.md             || { echo "::error::missing commands/arsenal.md"; exit 1; }
          for agent in tokens-engineer component-builder design-critic; do
            test -f "agents/${agent}.md" || { echo "::error::missing agents/${agent}.md"; exit 1; }
          done
          for script in check_arsenal.sh init_project_brief.py start_preview.sh; do
            test -f "scripts/${script}" || { echo "::error::missing scripts/${script}"; exit 1; }
          done
          echo "Structure OK."

      - name: install.sh sanity check
        run: |
          # install.sh now depends on the `claude` CLI at runtime; we cannot
          # exercise plugin registration in CI without Claude Code installed.
          # Instead, validate syntax and that the help/uninstall code paths
          # parse cleanly.
          set -e
          bash -n install.sh
          bash install.sh --help >/dev/null
          echo "install.sh OK."
