name: Bug report
description: Something in steve-designer behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail
        that we can reproduce the behavior.

  - type: input
    id: version
    attributes:
      label: steve-designer version
      description: Run `cat ~/.claude/plugins/steve-designer/.claude-plugin/plugin.json | grep version` (or the project path)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: install-mode
    attributes:
      label: Install mode
      options:
        - personal (~/.claude/plugins/steve-designer)
        - project (./.claude/plugins/steve-designer)
        - manual copy
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + shell
      placeholder: "macOS 15.2 / zsh"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you run? What did steve-designer do?
      placeholder: |
        1. `/steve-designer:start`
        2. Answered discovery as "…"
        3. At phase 4, the tokens-engineer subagent errored with …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the offending chat excerpt or error output.
    validations:
      required: true

  - type: textarea
    id: arsenal
    attributes:
      label: Arsenal state
      description: Output of `scripts/check_arsenal.sh`, if relevant.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
