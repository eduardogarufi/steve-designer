name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json schema
        run: |
          python3 - <<'PY'
          import json, sys
          with open(".claude-plugin/plugin.json") as f:
              m = json.load(f)
          required = ["name"]
          missing = [k for k in required if k not in m]
          if missing:
              print(f"::error::plugin.json missing required fields: {missing}")
              sys.exit(1)
          if m["name"] != "steve-designer":
              print(f"::error::plugin.json name mismatch: {m['name']!r}")
              sys.exit(1)
          print(f"OK plugin.json: {m['name']} v{m.get('version','?')}")
          PY

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: "./scripts"
          additional_files: "install.sh"

      - name: Check file structure
        run: |
          set -e
          echo "Verifying required plugin structure..."
          test -f .claude-plugin/plugin.json || { echo "::error::missing .claude-plugin/plugin.json"; exit 1; }
          test -f skills/steve-designer/SKILL.md || { echo "::error::missing skills/steve-designer/SKILL.md"; exit 1; }
          test -f commands/start.md              || { echo "::error::missing commands/start.md"; exit 1; }
          test -f commands/resume.md             || { echo "::error::missing commands/resume.md"; exit 1; }
          for agent in tokens-engineer component-builder design-critic; do
            test -f "agents/${agent}.md" || { echo "::error::missing agents/${agent}.md"; exit 1; }
          done
          for script in check_arsenal.sh init_project_brief.py start_preview.sh; do
            test -f "scripts/${script}" || { echo "::error::missing scripts/${script}"; exit 1; }
          done
          echo "Structure OK."

      - name: Dry-run install.sh (project mode)
        run: |
          set -e
          TEST_DIR=$(mktemp -d)
          cd "$TEST_DIR"
          bash "$GITHUB_WORKSPACE/install.sh" --project
          test -f .claude/plugins/steve-designer/.claude-plugin/plugin.json
          test -f .claude/plugins/steve-designer/skills/steve-designer/SKILL.md
          # Installer should NOT ship repo-meta
          ! test -e .claude/plugins/steve-designer/.git
          ! test -e .claude/plugins/steve-designer/docs
          ! test -e .claude/plugins/steve-designer/LICENSE
          ! test -e .claude/plugins/steve-designer/README.md
          ! test -e .claude/plugins/steve-designer/install.sh
          echo "Install OK."
